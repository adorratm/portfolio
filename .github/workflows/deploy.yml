name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: portfolio-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable Yarn 4 (Corepack)
        run: |
          corepack enable
          corepack prepare yarn@4.17.1 --activate
          yarn --version

      - name: Build backend
        working-directory: backend
        run: |
          yarn install --immutable
          yarn build

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.emrekilic.web.tr/api/v1
          NEXT_PUBLIC_SITE_URL: https://emrekilic.web.tr
          NEXT_PUBLIC_GA_MEASUREMENT_ID: G-LX5ZQR64J0
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
        run: |
          yarn install
          yarn build

      - name: Build admin
        working-directory: admin
        env:
          NEXT_PUBLIC_API_URL: https://api.emrekilic.web.tr/api/v1
          NEXT_PUBLIC_WS_URL: https://api.emrekilic.web.tr
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
        run: |
          yarn install
          yarn build

  deploy:
    name: Deploy to Hetzner
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Upload project archive to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          tar czf /tmp/portfolio-deploy.tar.gz \
            --exclude='**/node_modules' \
            --exclude='**/.next' \
            backend frontend admin deploy docker-compose.prod.yml

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}'"

          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=30 \
            /tmp/portfolio-deploy.tar.gz \
            "${SSH_USER}@${SSH_HOST}:/tmp/portfolio-deploy.tar.gz"

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" \
            -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            "cd '${DEPLOY_PATH}' && tar xzf /tmp/portfolio-deploy.tar.gz && rm -f /tmp/portfolio-deploy.tar.gz"

      - name: Run deploy script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 45m
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            chmod +x deploy/deploy.sh
            ./deploy/deploy.sh

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            API_PORT="$(grep '^API_HOST_PORT=' deploy/.env | cut -d= -f2)"
            API_PORT="${API_PORT:-3102}"

            for i in $(seq 1 20); do
              if curl -fsS "http://127.0.0.1:${API_PORT}/api/v1/health" >/dev/null 2>&1; then
                echo "==> Backend OK (${i}. deneme)"
                curl -fsS "http://127.0.0.1:${API_PORT}/api/v1/health"
                echo ""
                break
              fi
              if [[ "$i" -eq 20 ]]; then
                echo "==> Backend logları:"
                docker logs portfolio-prod-backend --tail 100 2>&1 || true
                exit 1
              fi
              echo "Bekleniyor... (${i}/20)"
              sleep 3
            done

            curl -fsS -o /dev/null -w "Frontend HTTP %{http_code}\n" http://127.0.0.1:3100/tr
