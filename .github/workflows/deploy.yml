name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: portfolio-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: |
            backend/yarn.lock
            frontend/yarn.lock
            admin/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Build backend
        working-directory: backend
        run: |
          yarn install --immutable
          yarn build

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.emrekilic.web.tr/api/v1
          NEXT_PUBLIC_SITE_URL: https://emrekilic.web.tr
        run: |
          yarn install --immutable
          yarn build

      - name: Build admin
        working-directory: admin
        env:
          NEXT_PUBLIC_API_URL: https://api.emrekilic.web.tr/api/v1
          NEXT_PUBLIC_WS_URL: https://api.emrekilic.web.tr
        run: |
          yarn install --immutable
          yarn build

  deploy:
    name: Deploy to Hetzner
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy/deploy.sh
            ./deploy/deploy.sh

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            curl -fsS https://api.emrekilic.web.tr/api/v1/health
