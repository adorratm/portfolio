# api.emrekilic.web.tr — NestJS API + WebSocket
# /etc/nginx/sites-available/api.emrekilic.web.tr

upstream portfolio_api {
    server 127.0.0.1:3102;
    keepalive 32;
}

server {
    listen 80;
    server_name api.emrekilic.web.tr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.emrekilic.web.tr;

    ssl_certificate     /etc/letsencrypt/live/emrekilic.web.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emrekilic.web.tr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 12M;

    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://portfolio_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
