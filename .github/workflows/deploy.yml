name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: portfolio-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable Yarn 4 (Corepack)
        run: |
          corepack enable
          corepack prepare yarn@4.17.1 --activate
          yarn --version

      - name: Build backend
        working-directory: backend
        run: |
          yarn install --immutable
          yarn build

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.emrekilic.web.tr/api/v1
          NEXT_PUBLIC_SITE_URL: https://emrekilic.web.tr
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
        run: |
          yarn install
          yarn build

      - name: Build admin
        working-directory: admin
        env:
          NEXT_PUBLIC_API_URL: https://api.emrekilic.web.tr/api/v1
          NEXT_PUBLIC_WS_URL: https://api.emrekilic.web.tr
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
        run: |
          yarn install
          yarn build

  deploy:
    name: Deploy to Hetzner
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: mkdir -p ${{ secrets.DEPLOY_PATH }}

      - name: Copy project files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "backend,frontend,admin,deploy,docker-compose.prod.yml"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0
          overwrite: true

      - name: Run deploy script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 45m
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            chmod +x deploy/deploy.sh
            ./deploy/deploy.sh

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 2m
          script: |
            curl -fsS https://api.emrekilic.web.tr/api/v1/health
